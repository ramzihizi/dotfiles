# Tmux configuration

# tmux color
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable modified key reporting for terminal apps like pi
set -g extended-keys on
set -g extended-keys-format csi-u

# Prefix key (default Ctrl+b)
set-option -g prefix C-b
bind-key C-b send-prefix

# Move status bar to top
# set-option -g status-position top
# set-option -g status-position buttom

# split-window
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# re-source ~/.tmux.conf
unbind r
# bind r source-file ~/.tmux.conf
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Panes manipulation
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r m resize-pane -Z
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# editing
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# speak selection aloud with "R" in copy-mode (macOS `say`)
bind-key -T copy-mode-vi R send-keys -X copy-pipe-and-cancel "/usr/bin/say"
bind-key -T copy-mode R send-keys -X copy-pipe-and-cancel "/usr/bin/say"


# Tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl

# Tmux THEMES
# Tokyo Night (janoamaral) — active theme
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme 'night'        # night | storm | moon | day
set -g @tokyo-night-tmux_transparent 1        # 0 = themed bg, 1 = transparent
set -g @tokyo-night-tmux_show_git 1           # git status widget
# Optional widgets (Nerd Font v3+ required; 0 = off, 1 = on):
# set -g @tokyo-night-tmux_show_path 1
# set -g @tokyo-night-tmux_show_netspeed 1
# set -g @tokyo-night-tmux_show_battery_widget 1
# set -g @tokyo-night-tmux_show_hostname 1

# Window list alignment — the Tokyo Night plugin doesn't set this, so set it
# explicitly (the old themepack left 'centre' behind; tmux's default is 'left').
set -g status-justify left

# --- Other themes (disabled) ---
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @plugin 'wfxr/tmux-power'
# set -g @plugin 'jimeh/tmux-themepack'
# set -g @themepack 'powerline/default/gray'


# tum resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality
set -sg escape-time 10

# Focus
set -g focus-events on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Show a clear marker when the current window has a zoomed pane.
set -ag status-right "#{?window_zoomed_flag, #[fg=colour203]#[bold]ZOOM#[default],}"

# Override theme settings for pane dimming (must be after tpm)
# set -g window-active-style 'bg=terminal,fg=terminal'      # use terminal colors
# set -g window-style 'bg=colour232,fg=colour240'           # very noticeable dimming

# Override theme border colors (must be after tpm)
# set -g pane-border-style 'fg=colour111,bg=colour25,bold'          # tokyo night blue inactive
# set -g pane-active-border-style 'fg=colour237,bg=colour234'       # subtle dark active border
# set -g pane-border-lines 'double'                                 # use double border lines
# set -g pane-border-format ' '                                     # empty format for cleaner look
