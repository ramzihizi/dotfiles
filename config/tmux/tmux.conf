# Tmux configuration

# tmux color
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable modified key reporting for terminal apps like pi
set -g extended-keys on
set -g extended-keys-format csi-u

# Prefix key (default Ctrl+b)
set-option -g prefix C-b
bind-key C-b send-prefix

# Move status bar to top
# set-option -g status-position top
# set-option -g status-position buttom

# split-window
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# re-source ~/.tmux.conf
unbind r
# bind r source-file ~/.tmux.conf
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Panes manipulation
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r m resize-pane -Z
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# editing
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# speak selection aloud with "R" in copy-mode (macOS `say`)
bind-key -T copy-mode-vi R send-keys -X copy-pipe-and-cancel "/usr/bin/say"
bind-key -T copy-mode R send-keys -X copy-pipe-and-cancel "/usr/bin/say"


# Tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl

# Tmux THEMES
# Gruvbox (egel) — active theme. Warm/amber, deliberately distinct from the
# ghostty+herdr environment (Tokyo Night) so this serious-work env reads at a
# glance. Matches wezterm "Gruvbox Dark" + nvim gruvbox.
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'                   # dark | dark256 | light

# Window list alignment — set explicitly (the old themepack left 'centre'
# behind; tmux's default is 'left').
set -g status-justify left

# --- Other themes (disabled) ---
# Tokyo Night (janoamaral) — used by the ghostty+herdr environment:
# set -g @plugin 'janoamaral/tokyo-night-tmux'
# set -g @tokyo-night-tmux_theme 'night'        # night | storm | moon | day
# set -g @tokyo-night-tmux_transparent 1        # 0 = themed bg, 1 = transparent
# set -g @tokyo-night-tmux_show_git 1           # git status widget
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @plugin 'wfxr/tmux-power'
# set -g @plugin 'jimeh/tmux-themepack'
# set -g @themepack 'powerline/default/gray'


# tum resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality
set -sg escape-time 10

# Focus
set -g focus-events on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Warm down the active-window highlight (must be after tpm). The egel gruvbox
# dark theme hardcodes col_yellow2=#fabd2f for window-status-current; that bright
# yellow is distracting, so recolor both the style and the format's inline bg/fg
# to neutral #b57614 (matches wezterm cursor, nvim, starship). Format mirrors the
# plugin's window-status-current-format with col_yellow2 -> #b57614, col_bg1
# #3c3836, col_bg2 #504945.
set -g window-status-current-style "bg=#b57614,fg=#3c3836"
set -g window-status-current-format "#[bg=#b57614,fg=#3c3836,nobold,noitalics,nounderscore]#[bg=#b57614,fg=#504945] #I #[bg=#b57614,fg=#504945,bold] #W#{?window_zoomed_flag,*Z,} #[bg=#3c3836]#[fg=#b57614,nobold,noitalics,nounderscore]"

# Show a clear marker when the current window has a zoomed pane.
set -ag status-right "#{?window_zoomed_flag, #[fg=colour203]#[bold]ZOOM#[default],}"

