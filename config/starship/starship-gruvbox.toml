# Starship prompt ÔÇö WARM Gruvbox palette for the wezterm+tmux work env.
# Selected via $STARSHIP_CONFIG in zshrc ($TMUX / $TERM_PROGRAM = WezTerm);
# the cool Tokyo Night default lives in starship.toml. Keep module layout
# and symbols in sync with starship.toml ÔÇö only the color styles differ here.
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$php\
$python\
$golang\
$rust\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #d79921"

[git_branch]
symbol = "´Éİ "
style = "bold #d65d0e"

[git_status]
style = "bold #cc241d"
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"

[nodejs]
symbol = "¯£İ "
format = "[$symbol($version )]($style)"
style = "bold #98971a"

[php]
symbol = "¯İê "
