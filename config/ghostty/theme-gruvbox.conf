# Gruvbox variant of the switchable ghostty settings.
# Pulled in via `config-file = theme-active.conf` in config; the `theme` command
# (config/bin/theme) repoints that symlink here. Only theme-specific colors live
# here — everything else stays in the main config.

# Gruvbox Dark Hard: the darkest gruvbox variant (background #1d2021).
theme = Gruvbox Dark Hard

# One shade below gruvbox hard: a proportionally-darkened near-black that keeps
# the gruvbox cool tint. The shared "darker gruvbox bg" token (herdr/nvim/kitty).
background = #161819

# Fill + divider for unfocused splits (darkened bg + gruvbox bg2).
unfocused-split-fill = #161819
split-divider-color = #3c3836
