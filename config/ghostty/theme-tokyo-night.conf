# Tokyo Night (Night) variant of the switchable ghostty settings.
# Pulled in via `config-file = theme-active.conf` in config; the `theme` command
# (config/bin/theme) repoints that symlink here. Only theme-specific colors live
# here — everything else stays in the main config.

# TokyoNight Night: the darkest Tokyo Night variant (background #1a1b26).
theme = TokyoNight Night

# One shade below TokyoNight Night's #1a1b26, mirroring the darkened-bg
# treatment used for gruvbox.
background = #16161e

# Fill + divider for unfocused splits (darkened bg + TokyoNight bg_highlight).
unfocused-split-fill = #16161e
split-divider-color = #292e42
