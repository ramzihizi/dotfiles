onboarding = false

[ui]
agent_panel_scope = "current"

[theme]
name = "tokyo-night"

[keys]
# --- Pane navigation (vim-style, no prefix) ---
# Move focus between split panes with Ctrl+h/j/k/l, like vim window motions.
# These are direct terminal-mode shortcuts (no prefix press first).
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# --- Agent sessions (the "agents" list: codex, claude, ...) ---
# Cycle AI sessions; vim direction (j = next/down, k = previous/up).
next_agent = "prefix+shift+j"
previous_agent = "prefix+shift+k"
# Free shift+j/k from their default pane-swap action so there's no conflict
# warning (we don't use pane-swap with single-pane workspaces).
swap_pane_down = ""
swap_pane_up = ""
# Jump straight to agent N: Ctrl-b Alt-1, Ctrl-b Alt-2, ...
focus_agent = "prefix+alt+1..9"

# --- Workspaces (top-level project contexts) ---
# Cycle workspaces; vim horizontal (h = previous/left, l = next/right).
# Mirrors agent j/k: workspaces on the horizontal axis, agents on the vertical.
previous_workspace = "prefix+shift+h"
next_workspace = "prefix+shift+l"
# Free shift+h/l from their default pane-swap action (no pane-swap with
# single-pane workspaces), same reasoning as swap_pane_down/up above.
swap_pane_left = ""
swap_pane_right = ""
# Jump straight to workspace N: Ctrl-b Shift-1, ... (tabs keep plain prefix+1..9).
switch_workspace = "prefix+shift+1..9"

# --- Navigate mode (workspace picker, prefix+w) ---
# j/k switch workspaces; pane up/down focus stays on arrows (no j/k collision).
navigate_workspace_down = "j"
navigate_workspace_up = "k"
navigate_pane_down = "down"
navigate_pane_up = "up"
